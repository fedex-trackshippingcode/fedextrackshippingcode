<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedex Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .fedex-purple { color: #4D148C; } .fedex-orange { color: #FF6200; }
        .bg-fedex-purple { background-color: #4D148C; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <script id="shipment-db">window.db = {};</script>

    <nav class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-50">
        <div id="admin-gate" class="cursor-pointer select-none">
            <span class="text-3xl font-black fedex-purple tracking-tighter">Fed</span><span class="text-3xl font-black fedex-orange tracking-tighter" style="text-transform: lowercase;">ex</span>
        </div>
    </nav>

    <section id="client-page" class="max-w-md mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-md mt-4">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Track shipment</h2>
            <input type="text" id="track-input" placeholder="Enter Tracking Code" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-purple-500">
            <button onclick="startTracking()" class="w-full bg-fedex-purple text-white font-bold py-3 rounded-lg shadow-lg">TRACK</button>
        </div>

        <div id="results" class="mt-6 hidden">
            <div class="bg-white rounded-xl shadow-xl border-t-8 border-fedex-orange p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="res-status" class="text-xl font-black fedex-purple uppercase italic"></h3>
                    <button id="inv-btn" onclick="getInvoice()" class="hidden bg-green-600 text-white text-xs px-3 py-2 rounded font-bold">DOWNLOAD INVOICE</button>
                </div>
                <img id="res-img" class="w-full rounded shadow mb-4 hidden">
                <div class="space-y-3 text-sm text-gray-600 border-t pt-4">
                    <p><strong>Receiver:</strong> <span id="res-name" class="text-black"></span></p>
                    <p><strong>Tracking Code:</strong> <span id="res-code" class="text-black"></span></p>
                    <p><strong>From:</strong> <span id="res-from" class="text-black"></span></p>
                    <p><strong>To:</strong> <span id="res-to" class="text-black"></span></p>
                    <div class="grid grid-cols-2">
                        <p><strong>Takeoff:</strong> <br><span id="res-take" class="text-blue-600"></span></p>
                        <p><strong>Arrival:</strong> <br><span id="res-reach" class="text-green-600"></span></p>
                    </div>
                    <p><strong>Update Date:</strong> <span id="res-date" class="text-black"></span></p>
                    <div id="fee-box" class="p-4 bg-red-50 border border-red-200 rounded mt-4 hidden">
                        <p class="text-red-700 font-bold text-center italic text-lg">Clearance Fee Required: $<span id="res-fee"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="admin-page" class="hidden max-w-lg mx-auto p-6 bg-white min-h-screen">
        <h2 class="text-xl font-bold border-b-2 border-fedex-orange pb-2 mb-6 uppercase">Shipment Manager</h2>
        <div class="space-y-4">
            <input type="text" id="adm-id" placeholder="New Tracking Code" class="w-full border p-3 rounded font-bold bg-yellow-50">
            <input type="text" id="adm-name" placeholder="Receiver Name" class="w-full border p-3 rounded">
            <input type="text" id="adm-from" placeholder="Origin City" class="w-full border p-3 rounded">
            <input type="text" id="adm-to" placeholder="Destination City" class="w-full border p-3 rounded">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="adm-take" placeholder="Takeoff Time" class="border p-3 rounded">
                <input type="text" id="adm-reach" placeholder="Reach Time" class="border p-3 rounded">
            </div>
            <select id="adm-status" class="w-full border p-3 rounded bg-blue-50">
                <option value="Loading">Loading</option>
                <option value="In transit (moving)">In transit (moving)</option>
                <option value="Hold">Hold</option>
                <option value="Held at customs">Held at customs (customs fee required)</option>
                <option value="Arrived">Arrived (Clearance fee required)</option>
            </select>
            <input type="number" id="adm-fee" placeholder="Fee Amount ($)" class="w-full border p-3 rounded">
            <label class="block text-xs font-bold text-gray-400">UPLOAD PACKAGE IMAGE</label>
            <input type="file" id="adm-pic" accept="image/*" class="text-xs w-full">
            <button onclick="saveToCloud()" id="save-btn" class="w-full bg-orange-600 text-white font-black py-4 rounded-xl shadow-lg mt-4">SAVE TO CLOUD</button>
            <button onclick="location.reload()" class="w-full text-gray-400 text-xs mt-4">Exit Admin</button>
        </div>
    </section>

    <script>
        const GIT = {
            T: "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",
            U: "fedex-trackshippingcode",
            R: "fedextrackshippingcode",
            F: "index.html"
        };

        let taps = 0;
        document.getElementById('admin-gate').onclick = () => {
            taps++;
            if(taps === 3) {
                let pass = prompt("Admin Password");
                if(pass === "0000" && prompt("Enter Token") === GIT.T) {
                    document.getElementById('client-page').classList.add('hidden');
                    document.getElementById('admin-page').classList.remove('hidden');
                }
                taps = 0;
            }
        };

        function startTracking() {
            const code = document.getElementById('track-input').value.trim();
            if(!code || !window.db[code]) return alert("Tracking code not found.");
            
            const data = window.db[code];
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-status').innerText = data.status;
            document.getElementById('res-name').innerText = data.name;
            document.getElementById('res-code').innerText = code;
            document.getElementById('res-from').innerText = data.from;
            document.getElementById('res-to').innerText = data.to;
            document.getElementById('res-take').innerText = data.take;
            document.getElementById('res-reach').innerText = data.reach;
            document.getElementById('res-date').innerText = data.date;
            
            if(data.img) { 
                document.getElementById('res-img').src = data.img; 
                document.getElementById('res-img').classList.remove('hidden'); 
            } else {
                document.getElementById('res-img').classList.add('hidden');
            }

            if(data.status === "Arrived" || data.status === "Held at customs") {
                document.getElementById('fee-box').classList.remove('hidden');
                document.getElementById('res-fee').innerText = data.fee;
                document.getElementById('inv-btn').classList.remove('hidden');
                window.currentData = data; window.currentCode = code;
            } else {
                document.getElementById('fee-box').classList.add('hidden');
                document.getElementById('inv-btn').classList.add('hidden');
            }
        }

        async function saveToCloud() {
            const btn = document.getElementById('save-btn');
            const code = document.getElementById('adm-id').value.trim();
            if(!code) return alert("Missing Tracking Code");
            
            btn.innerText = "CONNECTING..."; btn.disabled = true;

            try {
                const file = document.getElementById('adm-pic').files[0];
                let base64 = "";
                if(file) {
                    base64 = await new Promise((r) => {
                        const reader = new FileReader();
                        reader.onloadend = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });
                } else if (window.db[code]) { 
                    base64 = window.db[code].img; 
                }

                window.db[code] = {
                    name: document.getElementById('adm-name').value,
                    from: document.getElementById('adm-from').value,
                    to: document.getElementById('adm-to').value,
                    take: document.getElementById('adm-take').value,
                    reach: document.getElementById('adm-reach').value,
                    status: document.getElementById('adm-status').value,
                    fee: document.getElementById('adm-fee').value,
                    img: base64,
                    date: new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' })
                };

                const url = `https://api.github.com/repos/${GIT.U}/${GIT.R}/contents/${GIT.F}`;
                
                // Get current file state
                const getFile = await fetch(url, { 
                    headers: { 'Authorization': `token ${GIT.T}`, 'Cache-Control': 'no-cache' } 
                });
                const meta = await getFile.json();
                
                if(!meta.sha) throw new Error("Could not find file on GitHub. Check Repo/User names.");

                const originalHTML = decodeURIComponent(escape(atob(meta.content)));
                const dbTag = `<script id="shipment-db">window.db = ${JSON.stringify(window.db)};<\/script>`;
                const updatedHTML = originalHTML.replace(/<script id="shipment-db">.*?<\/script>/, dbTag);

                btn.innerText = "UPLOADING...";

                const response = await fetch(url, {
                    method: "PUT",
                    headers: { 'Authorization': `token ${GIT.T}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Update shipment: ${code}`,
                        content: btoa(unescape(encodeURIComponent(updatedHTML))),
                        sha: meta.sha
                    })
                });

                if(response.ok) {
                    alert("SUCCESS: Data saved to cloud!");
                    location.reload();
                } else {
                    const errData = await response.json();
                    console.error(errData);
                    alert("FAILED: " + (errData.message || "Unknown error"));
                    btn.innerText = "SAVE TO CLOUD"; btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                alert("ERROR: " + err.message);
                btn.innerText = "SAVE TO CLOUD"; btn.disabled = false;
            }
        }

        function getInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(77, 20, 140); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("Fedex Shipping Invoice", 20, 25);
            doc.setTextColor(0, 0, 0); doc.setFontSize(10);
            doc.text(`DATE: ${window.currentData.date}`, 20, 50);
            doc.text(`TRACKING NO: ${window.currentCode}`, 20, 58);
            doc.text(`RECEIVER: ${window.currentData.name}`, 20, 66);
            doc.text(`FROM: ${window.currentData.from} -> TO: ${window.currentData.to}`, 20, 74);
            doc.setFontSize(14); doc.text(`TOTAL DUE: $${window.currentData.fee}`, 20, 95);
            doc.setDrawColor(255, 98, 0); doc.setLineWidth(1); doc.ellipse(150, 130, 30, 20);
            doc.setTextColor(255, 98, 0); doc.setFontSize(10); doc.text("OFFICIAL STAMP", 132, 128);
            doc.text("VERIFIED", 140, 134);
            doc.save(`Invoice_${window.currentCode}.pdf`);
        }
    </script>
</body>
</html>
