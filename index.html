<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedex Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .fedex-purple { color: #4D148C; } .fedex-orange { color: #FF6200; }
        .bg-fedex-purple { background-color: #4D148C; }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <script id="shipment-database">window.db = {};</script>

    <nav class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-50">
        <div id="admin-gate" class="cursor-pointer select-none">
            <span class="text-3xl font-black fedex-purple tracking-tighter">Fed</span><span class="text-3xl font-black fedex-orange tracking-tighter" style="text-transform: lowercase;">ex</span>
        </div>
    </nav>

    <section id="client-page" class="max-w-md mx-auto p-6">
        <div class="bg-white p-6 rounded-xl shadow-md mt-4">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Track shipment</h2>
            <input type="text" id="track-input" placeholder="Enter Tracking Code" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-purple-500">
            <button onclick="startTracking()" class="w-full bg-fedex-purple text-white font-bold py-3 rounded-lg shadow-lg">TRACK</button>
        </div>

        <div id="results" class="mt-6 hidden">
            <div class="bg-white rounded-xl shadow-xl border-t-8 border-fedex-orange p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="res-status" class="text-xl font-black fedex-purple uppercase italic"></h3>
                    <button id="inv-btn" onclick="getInvoice()" class="hidden bg-green-600 text-white text-xs px-3 py-2 rounded font-bold">DOWNLOAD INVOICE</button>
                </div>
                <img id="res-img" class="w-full rounded shadow mb-4 hidden">
                <div class="space-y-2 text-sm text-gray-600 border-t pt-4">
                    <p><strong>Receiver:</strong> <span id="res-name" class="text-black"></span></p>
                    <p><strong>Tracking Code:</strong> <span id="res-code" class="text-black"></span></p>
                    <p><strong>From:</strong> <span id="res-from" class="text-black"></span></p>
                    <p><strong>To:</strong> <span id="res-to" class="text-black"></span></p>
                    <p><strong>Takeoff:</strong> <span id="res-take" class="text-blue-600"></span></p>
                    <p><strong>Arrival:</strong> <span id="res-reach" class="text-green-600"></span></p>
                    <p><strong>Date:</strong> <span id="res-date" class="text-black"></span></p>
                    <div id="fee-box" class="p-3 bg-red-50 border border-red-200 rounded mt-4 hidden">
                        <p class="text-red-700 font-bold text-center italic">Required Fee: $<span id="res-fee"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="loader" class="hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-fedex-purple"></div>
        <p class="mt-4 font-bold fedex-purple italic">tracking...</p>
    </div>

    <section id="admin-page" class="hidden max-w-lg mx-auto p-6 bg-white min-h-screen">
        <h2 class="text-xl font-bold border-b-2 border-fedex-orange pb-2 mb-6 uppercase">Admin Panel</h2>
        <div class="space-y-4">
            <input type="text" id="adm-id" placeholder="Tracking Code" class="w-full border p-3 rounded bg-gray-50 font-bold">
            <input type="text" id="adm-name" placeholder="Receiver Name" class="w-full border p-3 rounded">
            <input type="text" id="adm-from" placeholder="Origin City" class="w-full border p-3 rounded">
            <input type="text" id="adm-to" placeholder="Destination City" class="w-full border p-3 rounded">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="adm-take" placeholder="Takeoff Time" class="border p-3 rounded">
                <input type="text" id="adm-reach" placeholder="Reach Time" class="border p-3 rounded">
            </div>
            <select id="adm-status" class="w-full border p-3 rounded">
                <option value="Loading">Loading</option>
                <option value="In transit (moving)">In transit (moving)</option>
                <option value="Hold">Hold</option>
                <option value="Held at customs">Held at customs (fee required)</option>
                <option value="Arrived">Arrived (Clearance fee required)</option>
            </select>
            <input type="number" id="adm-fee" placeholder="Fee Amount ($)" class="w-full border p-3 rounded">
            <label class="text-xs text-gray-500">Upload Package Image:</label>
            <input type="file" id="adm-pic" accept="image/*" class="w-full text-xs">
            <button onclick="saveToCloud()" class="w-full bg-orange-600 text-white font-black py-4 rounded-xl shadow-lg mt-4">SAVE TO CLOUD</button>
        </div>
    </section>

    <script>
        const CONFIG = {
            TOKEN: "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",
            OWNER: "fedex-trackshippingcode",
            REPO: "fedextrackshippingcode",
            FILE: "index.html"
        };

        let t = 0;
        document.getElementById('admin-gate').onclick = () => {
            t++; if(t === 3) {
                if(prompt("Admin Password") === "0000" && prompt("Enter Token") === CONFIG.TOKEN) {
                    document.getElementById('client-page').classList.add('hidden');
                    document.getElementById('admin-page').classList.remove('hidden');
                } t = 0;
            }
        };

        function startTracking() {
            const code = document.getElementById('track-input').value;
            if(!code || !window.db[code]) return alert("Invalid Tracking Code");
            
            document.getElementById('loader').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                const p = window.db[code];
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('res-status').innerText = p.status;
                document.getElementById('res-name').innerText = p.name;
                document.getElementById('res-code').innerText = code;
                document.getElementById('res-from').innerText = p.from;
                document.getElementById('res-to').innerText = p.to;
                document.getElementById('res-take').innerText = p.take;
                document.getElementById('res-reach').innerText = p.reach;
                document.getElementById('res-date').innerText = p.date;
                
                if(p.img) { document.getElementById('res-img').src = p.img; document.getElementById('res-img').classList.remove('hidden'); }
                if(p.status === "Arrived") {
                    document.getElementById('fee-box').classList.remove('hidden');
                    document.getElementById('res-fee').innerText = p.fee;
                    document.getElementById('inv-btn').classList.remove('hidden');
                    window.currentData = p; window.currentCode = code;
                }
            }, 3000);
        }

        async function saveToCloud() {
            const f = document.getElementById('adm-pic').files[0];
            const reader = new FileReader();
            
            reader.onloadend = async () => {
                const id = document.getElementById('adm-id').value;
                window.db[id] = {
                    name: document.getElementById('adm-name').value,
                    from: document.getElementById('adm-from').value,
                    to: document.getElementById('adm-to').value,
                    take: document.getElementById('adm-take').value,
                    reach: document.getElementById('adm-reach').value,
                    status: document.getElementById('adm-status').value,
                    fee: document.getElementById('adm-fee').value,
                    img: f ? reader.result : (window.db[id] ? window.db[id].img : ""),
                    date: new Date().toLocaleDateString()
                };

                const getFile = await fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.FILE}`, {
                    headers: { Authorization: `token ${CONFIG.TOKEN}` }
                });
                const fileData = await getFile.json();
                let content = atob(fileData.content);

                const newDbTag = `<script id="shipment-database">window.db = ${JSON.stringify(window.db)};<\/script>`;
                const updatedContent = content.replace(/<script id="shipment-database">.*?<\/script>/, newDbTag);

                const res = await fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${CONFIG.FILE}`, {
                    method: "PUT",
                    headers: { Authorization: `token ${CONFIG.TOKEN}` },
                    body: JSON.stringify({
                        message: `Update ${id}`,
                        content: btoa(updatedContent),
                        sha: fileData.sha
                    })
                });

                if(res.ok) { alert("Saved to Cloud!"); location.reload(); }
            };
            if(f) reader.readAsDataURL(f); else reader.onloadend();
        }

        function getInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(77, 20, 140); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(26); doc.text("Fedex Official Invoice", 20, 25);
            doc.setTextColor(0, 0, 0); doc.setFontSize(12);
            doc.text(`Date: ${window.currentData.date}`, 20, 50);
            doc.text(`Tracking: ${window.currentCode}`, 20, 60);
            doc.text(`Receiver: ${window.currentData.name}`, 20, 70);
            doc.text(`Route: ${window.currentData.from} to ${window.currentData.to}`, 20, 80);
            doc.setFontSize(16); doc.text(`TOTAL DUE: $${window.currentData.fee}`, 20, 100);
            doc.setDrawColor(255, 98, 0); doc.setLineWidth(1); doc.ellipse(150, 130, 30, 20);
            doc.setTextColor(255, 98, 0); doc.setFontSize(10); doc.text("OFFICIALLY STAMPED", 132, 130);
            doc.save(`Invoice_${window.currentCode}.pdf`);
        }
    </script>
</body>
    </html>
